<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
<title>Stella's Kitchen</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3/dist/tabler-icons.min.css" />
<style>

    font-family: var(--font-sans);
    background:#FBD9B0;
    display:flex; align-items:center; justify-content:center;

  }
  button{ font-family: var(--font-sans); }
</style>
</head>
<body>
<div style="width:100%;max-width:680px;margin:0 auto;">
<div id="stage" style="position:relative;width:100%;height:560px;border-radius:18px;overflow:hidden;background:#FDEBD2;border:0.5px solid rgba(0,0,0,.12);font-family:var(--font-sans);">

  <svg id="bgdefs" width="0" height="0" style="position:absolute;width:0;height:0;overflow:hidden" aria-hidden="true"><defs>
    <pattern id="bg_strawberry" width="46" height="46" patternUnits="userSpaceOnUse">
      <rect width="46" height="46" fill="#FFDCE4"/>
      <path d="M23 15 C31 15 34 21 34 27 C34 34 28 40 23 41 C18 40 12 34 12 27 C12 21 15 15 23 15 Z" fill="#E8455C"/>
      <path d="M23 12 L17 18 L23 17 L29 18 Z" fill="#54B45A"/>
      <circle cx="19" cy="24" r="1.1" fill="#FFE082"/><circle cx="27" cy="24" r="1.1" fill="#FFE082"/><circle cx="23" cy="29" r="1.1" fill="#FFE082"/><circle cx="20" cy="33" r="1.1" fill="#FFE082"/><circle cx="27" cy="33" r="1.1" fill="#FFE082"/>
    </pattern>
    <pattern id="bg_watermelon" width="50" height="50" patternUnits="userSpaceOnUse">
      <rect width="50" height="50" fill="#FFC2CE"/>
      <path d="M25 14 L12 40 L38 40 Z" fill="#FB6F92"/>
      <path d="M12 40 Q25 47 38 40 L38 44 Q25 51 12 44 Z" fill="#3FA34D"/>
      <ellipse cx="22" cy="33" rx="1.2" ry="2" fill="#2b2b2b"/><ellipse cx="28" cy="33" rx="1.2" ry="2" fill="#2b2b2b"/><ellipse cx="25" cy="28" rx="1.2" ry="2" fill="#2b2b2b"/>
    </pattern>
    <pattern id="bg_heart" width="40" height="40" patternUnits="userSpaceOnUse">
      <rect width="40" height="40" fill="#FFE3EE"/>
      <path d="M20 31 C20 31 9 24 9 16 C9 12 12 9 15.5 9 C18 9 20 11.5 20 13 C20 11.5 22 9 24.5 9 C28 9 31 12 31 16 C31 24 20 31 20 31 Z" fill="#FF7BA3"/>
    </pattern>
    <pattern id="bg_star" width="44" height="44" patternUnits="userSpaceOnUse">
      <rect width="44" height="44" fill="#CFE5FF"/>
      <path d="M22 9 L25.5 18 L35 18 L27 24 L30 34 L22 28 L14 34 L17 24 L9 18 L18.5 18 Z" fill="#FFD23F"/>
      <path d="M8 6 L9.4 9.6 L13 9.6 L10 12 L11 15.6 L8 13.4 L5 15.6 L6 12 L3 9.6 L6.6 9.6 Z" fill="#FFE89B"/>
    </pattern>
  </defs></svg>

  <button id="soundBtn" aria-label="Music on or off" style="position:absolute;top:10px;right:10px;z-index:5;width:42px;height:42px;border-radius:50%;border:2px solid #fff;background:rgba(255,255,255,.9);color:#5D4037;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:19px;box-shadow:0 2px 4px rgba(0,0,0,.15);"><i class="ti ti-music" aria-hidden="true"></i></button>

  <div id="screen1" style="position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:16px;box-sizing:border-box;background:#CDE8F0;">
    <div style="position:relative;width:360px;max-width:92%;">
      <svg viewBox="0 0 400 340" width="100%" role="img" aria-label="A cute cooking store with an open sign">
        <ellipse cx="200" cy="318" rx="180" ry="20" fill="#9FCFA0"/>
        <rect x="70" y="120" width="260" height="200" rx="8" fill="#FFF6E9" stroke="#E0B98C" stroke-width="2"/>
        <polygon points="52,126 200,52 348,126" fill="#E0795A"/>
        <polygon points="52,126 200,52 348,126" fill="none" stroke="#B85A3E" stroke-width="3" stroke-linejoin="round"/>
        <rect x="190" y="60" width="18" height="20" rx="3" fill="#B85A3E"/>
        <circle cx="199" cy="50" r="7" fill="#fff" opacity="0.8"/>
        <circle cx="212" cy="42" r="9" fill="#fff" opacity="0.7"/>
        <rect x="108" y="128" width="184" height="30" rx="6" fill="#5D4037"/>
        <text x="200" y="149" text-anchor="middle" fill="#FFE9C7" font-size="17" font-family="var(--font-sans)" font-weight="500">Stella's Kitchen</text>
        <g>
          <rect x="92" y="178" width="68" height="56" rx="6" fill="#BFE3EA" stroke="#E0B98C" stroke-width="2"/>
          <path d="M88 178 h76 l-8 16 h-60 z" fill="#E0795A"/>
          <circle cx="126" cy="210" r="13" fill="#F6C14B"/>
          <path d="M114 210 a12 12 0 0 1 24 0 z" fill="#E0795A"/>
        </g>
        <g>
          <rect x="240" y="178" width="68" height="56" rx="6" fill="#BFE3EA" stroke="#E0B98C" stroke-width="2"/>
          <path d="M236 178 h76 l-8 16 h-60 z" fill="#E0795A"/>
          <rect x="262" y="198" width="24" height="22" rx="3" fill="#F6C14B"/>
          <rect x="262" y="198" width="24" height="8" rx="3" fill="#E57BA0"/>
        </g>
        <rect x="172" y="210" width="56" height="110" rx="6" fill="#A1745A"/>
        <rect x="172" y="210" width="56" height="110" rx="6" fill="none" stroke="#7A5440" stroke-width="2"/>
        <circle cx="218" cy="266" r="4" fill="#FFE9C7"/>
        <g>
          <rect x="176" y="190" width="48" height="20" rx="4" fill="#2E7D32"/>
          <text x="200" y="204" text-anchor="middle" fill="#fff" font-size="13" font-family="var(--font-sans)" font-weight="500">OPEN</text>
          <line x1="186" y1="190" x2="183" y2="180" stroke="#5D4037" stroke-width="2"/>
          <line x1="214" y1="190" x2="217" y2="180" stroke="#5D4037" stroke-width="2"/>
        </g>
      </svg>
      <button id="playBtn" aria-label="Play" style="position:absolute;left:50%;top:80%;transform:translate(-50%,-50%);background:#34A853;color:#fff;border:3px solid #fff;border-radius:40px;padding:12px 26px;font-size:20px;font-weight:500;font-family:var(--font-sans);cursor:pointer;box-shadow:0 4px 0 #1f7a37;display:flex;align-items:center;gap:8px;">
        <i class="ti ti-player-play" aria-hidden="true"></i> Play
      </button>
    </div>
    <p style="margin:18px 0 0;color:#5D4037;font-size:16px;font-weight:500;">Tap the green button to come in!</p>
  </div>

  <div id="screen2" style="position:absolute;inset:0;display:none;flex-direction:column;align-items:center;padding:10px 12px;box-sizing:border-box;background:#FFE5F0;">
    <div id="animRow" style="display:flex;align-items:center;justify-content:center;gap:6px;flex-wrap:wrap;width:100%;"></div>
    <div style="background:#fff;border-radius:16px;margin:8px 0;padding:4px;">
      <svg id="charPreview" viewBox="0 0 200 250" width="138" height="173" role="img" aria-label="Your animal"></svg>
    </div>
    <div style="display:flex;gap:6px;flex-wrap:wrap;justify-content:center;">
      <button class="catBtn" data-cat="dress" style="border:2px solid #fff;background:#fff;border-radius:12px;padding:7px 14px;font-size:15px;font-weight:500;cursor:pointer;color:#5D4037;">Dress</button>
      <button class="catBtn" data-cat="shirt" style="border:2px solid #fff;background:#fff;border-radius:12px;padding:7px 14px;font-size:15px;font-weight:500;cursor:pointer;color:#5D4037;">Shirt</button>
      <button class="catBtn" data-cat="bottoms" style="border:2px solid #fff;background:#fff;border-radius:12px;padding:7px 14px;font-size:15px;font-weight:500;cursor:pointer;color:#5D4037;">Bottoms</button>
      <button class="catBtn" data-cat="shoes" style="border:2px solid #fff;background:#fff;border-radius:12px;padding:7px 14px;font-size:15px;font-weight:500;cursor:pointer;color:#5D4037;">Shoes</button>
    </div>
    <div id="swatches" style="display:flex;gap:8px;flex-wrap:wrap;justify-content:center;margin-top:10px;"></div>
    <button id="doneBtn" style="margin-top:auto;margin-bottom:4px;background:#E0795A;color:#fff;border:3px solid #fff;border-radius:40px;padding:11px 30px;font-size:19px;font-weight:500;cursor:pointer;box-shadow:0 4px 0 #B85A3E;display:flex;align-items:center;gap:8px;">Done <i class="ti ti-arrow-right" aria-hidden="true"></i></button>
  </div>

  <div id="screen3" style="position:absolute;inset:0;display:none;flex-direction:column;align-items:center;justify-content:center;padding:14px;box-sizing:border-box;background:#FFF3D6;">
    <p style="margin:0 0 8px;color:#E0795A;font-size:22px;font-weight:500;">You look amazing!</p>
    <div id="revealBox" style="position:relative;width:220px;height:230px;border-radius:18px;overflow:hidden;border:3px solid #fff;box-shadow:0 3px 8px rgba(0,0,0,.15);background:#fff;"></div>
    <div style="display:flex;gap:8px;margin-top:12px;flex-wrap:wrap;justify-content:center;">
      <button id="cookBtn" style="background:#34A853;color:#fff;border:3px solid #fff;border-radius:30px;padding:10px 20px;font-size:16px;font-weight:500;cursor:pointer;box-shadow:0 3px 0 #1f7a37;display:flex;align-items:center;gap:6px;">Cook a treat <i class="ti ti-chef-hat" aria-hidden="true"></i></button>
      <button id="bgPageBtn" style="background:#BA9DDA;color:#fff;border:3px solid #fff;border-radius:30px;padding:10px 18px;font-size:15px;font-weight:500;cursor:pointer;box-shadow:0 3px 0 #8E6FB0;display:flex;align-items:center;gap:6px;">Background <i class="ti ti-photo" aria-hidden="true"></i></button>
      <button id="backBtn" style="background:#fff;color:#5D4037;border:2px solid #E0B98C;border-radius:30px;padding:10px 16px;font-size:15px;font-weight:500;cursor:pointer;display:flex;align-items:center;gap:6px;"><i class="ti ti-arrow-left" aria-hidden="true"></i> Dress up</button>
    </div>
  </div>

  <div id="screen4" style="position:absolute;inset:0;display:none;flex-direction:column;align-items:center;padding:8px 12px;box-sizing:border-box;background:#FFF6E9;">
    <svg viewBox="0 0 440 92" width="320" style="max-width:90%;margin-top:4px;" role="img" aria-label="Backgrounds">
      <text x="220" y="64" text-anchor="middle" font-family="var(--font-sans)" font-weight="700" font-size="50" stroke="#fff" stroke-width="13" stroke-linejoin="round" fill="#fff">Backgrounds</text>
      <text x="220" y="64" text-anchor="middle" font-family="var(--font-sans)" font-weight="700" font-size="50" stroke="#D14D7A" stroke-width="2.5" stroke-linejoin="round" fill="#FF8FB0">Backgrounds</text>
    </svg>
    <div id="bgPreview" style="position:relative;width:196px;height:196px;border-radius:18px;overflow:hidden;border:3px solid #fff;box-shadow:0 2px 6px rgba(0,0,0,.15);margin:4px 0;"></div>
    <div id="bgRow" style="display:flex;gap:10px;flex-wrap:wrap;justify-content:center;margin-top:2px;"></div>
    <button id="readyBtn" style="margin-top:auto;margin-bottom:6px;background:#34A853;color:#fff;border:3px solid #fff;border-radius:40px;padding:11px 30px;font-size:19px;font-weight:500;cursor:pointer;box-shadow:0 4px 0 #1f7a37;display:flex;align-items:center;gap:8px;">Ready! <i class="ti ti-check" aria-hidden="true"></i></button>
  </div>

  <div id="screen5" style="position:absolute;inset:0;display:none;flex-direction:column;align-items:center;padding:12px;box-sizing:border-box;background:#FCEFD8;">
    <p id="cookTitle" style="margin:2px 0 6px;color:#B85A3E;font-size:20px;font-weight:500;text-align:center;"></p>
    <div id="cookArea" style="flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;width:100%;"></div>
    <div id="cookBtns" style="margin-top:auto;margin-bottom:6px;display:flex;gap:8px;flex-wrap:wrap;justify-content:center;"></div>
  </div>

</div>
</div>
<script>
(function(){
  var FUR={
    cat:{fur:'#AEB6BD',dark:'#8A9197',light:'#E8EBED',nose:'#E57BA0'},
    dog:{fur:'#E0A96D',dark:'#B0824C',light:'#F6E4CC',nose:'#5B3A2E'},
    bunny:{fur:'#EDEAE8',dark:'#D4CECB',light:'#FFFFFF',nose:'#E57BA0'},
    bear:{fur:'#B07B4F',dark:'#8A5E38',light:'#D9B98E',nose:'#5B3A2E'},
    panda:{fur:'#F4F4F4',dark:'#2E2E2E',light:'#FFFFFF',nose:'#2E2E2E'},
    koala:{fur:'#A9B2B8',dark:'#8A9197',light:'#D7DCDF',nose:'#4A4A4A'}
  };
  var ANIMALS=[['cat','Cat','#AEB6BD'],['dog','Dog','#E0A96D'],['bunny','Bunny','#EDEAE8'],['bear','Bear','#B07B4F'],['panda','Panda','#F4F4F4'],['koala','Koala','#A9B2B8']];
  var BGS=[['strawberry','Strawberry'],['watermelon','Watermelon'],['heart','Heart'],['kitchen','Kitchen'],['star','Star']];
  var state={species:'cat',shirt:null,bottoms:null,dress:null,shoes:null,bg:'kitchen'};
  var category='shirt';
  var PALETTE=[['#F48FB1','pink'],['#64B5F6','blue'],['#FFD54F','yellow'],['#81C784','green'],['#BA9DDA','purple'],['#E57373','red']];

  var actx=null,master=null,musicOn=true,mTimer=null,nextTime=0;
  var F={C5:523.25,D5:587.33,E5:659.25,F5:698.46,G5:783.99,A5:880,B5:987.77,C6:1046.5,C4:261.63,F4:349.23,G4:392};
  var BEAT=0.30;
  var MEL=[['E5',1],['E5',1],['G5',2],['C6',1],['B5',1],['A5',2],['F5',1],['F5',1],['A5',2],['G5',1],['F5',1],['E5',2],['D5',1],['E5',1],['F5',2],['E5',1],['D5',1],['C5',2],['G5',1],['A5',1],['B5',1],['C6',1],['A5',2],['G5',2]];
  var BASS=[['C4',0,4],['F4',8,4],['G4',16,4],['C4',24,4]];
  var LOOP=32*BEAT;
  function note(f,t,d,type,vol){var o=actx.createOscillator(),g=actx.createGain();o.type=type;o.frequency.value=f;o.connect(g);g.connect(master);g.gain.setValueAtTime(0.0001,t);g.gain.linearRampToValueAtTime(vol,t+0.025);g.gain.exponentialRampToValueAtTime(0.0001,t+d*0.92);o.start(t);o.stop(t+d);}
  function scheduleLoop(){var t=nextTime,i;for(i=0;i<MEL.length;i++){note(F[MEL[i][0]],t,MEL[i][1]*BEAT*0.95,'triangle',0.16);t+=MEL[i][1]*BEAT;}for(i=0;i<BASS.length;i++){note(F[BASS[i][0]],nextTime+BASS[i][1]*BEAT,BASS[i][2]*BEAT*0.9,'sine',0.10);}nextTime+=LOOP;}
  function startMusic(){if(!actx){actx=new (window.AudioContext||window.webkitAudioContext)();master=actx.createGain();master.gain.value=0.5;master.connect(actx.destination);}if(actx.state==='suspended')actx.resume();if(mTimer)return;nextTime=actx.currentTime+0.15;scheduleLoop();mTimer=setInterval(function(){if(musicOn)scheduleLoop();},LOOP*1000);}
  function setMusic(on){musicOn=on;var ic=document.querySelector('#soundBtn i');if(ic)ic.className=on?'ti ti-music':'ti ti-music-off';if(on){startMusic();if(master)master.gain.value=0.5;}else{if(master)master.gain.value=0;}}
  function ding(){if(!actx||!musicOn)return;var t=actx.currentTime;note(880,t,0.18,'sine',0.22);note(1318.5,t+0.16,0.4,'sine',0.22);}

  function ears(sp,c){
    if(sp==='cat')return '<polygon points="70,56 58,14 96,48" fill="'+c.fur+'"/><polygon points="130,56 142,14 104,48" fill="'+c.fur+'"/><polygon points="74,52 66,28 90,46" fill="#F7C8D8"/><polygon points="126,52 134,28 110,46" fill="#F7C8D8"/>';
    if(sp==='dog')return '<ellipse cx="60" cy="84" rx="16" ry="36" fill="'+c.dark+'"/><ellipse cx="140" cy="84" rx="16" ry="36" fill="'+c.dark+'"/>';
    if(sp==='bunny')return '<ellipse cx="80" cy="28" rx="13" ry="42" fill="'+c.fur+'"/><ellipse cx="120" cy="28" rx="13" ry="42" fill="'+c.fur+'"/><ellipse cx="80" cy="32" rx="6" ry="30" fill="#F7C8D8"/><ellipse cx="120" cy="32" rx="6" ry="30" fill="#F7C8D8"/>';
    if(sp==='bear')return '<circle cx="66" cy="50" r="18" fill="'+c.fur+'"/><circle cx="134" cy="50" r="18" fill="'+c.fur+'"/><circle cx="66" cy="50" r="9" fill="'+c.dark+'"/><circle cx="134" cy="50" r="9" fill="'+c.dark+'"/>';
    if(sp==='panda')return '<circle cx="64" cy="46" r="19" fill="'+c.dark+'"/><circle cx="136" cy="46" r="19" fill="'+c.dark+'"/>';
    return '<circle cx="56" cy="60" r="25" fill="'+c.fur+'"/><circle cx="144" cy="60" r="25" fill="'+c.fur+'"/><circle cx="56" cy="60" r="15" fill="#C9A9B0"/><circle cx="144" cy="60" r="15" fill="#C9A9B0"/>';
  }
  function render(s){
    var c=FUR[s.species];var sp=s.species;var m='';
    m+=ears(sp,c);
    m+='<ellipse cx="100" cy="188" rx="52" ry="56" fill="'+c.fur+'"/>';
    m+='<ellipse cx="76" cy="242" rx="17" ry="11" fill="'+c.fur+'"/><ellipse cx="124" cy="242" rx="17" ry="11" fill="'+c.fur+'"/>';
    if(s.bottoms){m+='<rect x="58" y="196" width="84" height="40" rx="10" fill="'+s.bottoms+'"/>';}
    if(s.shirt){m+='<rect x="54" y="150" width="92" height="50" rx="14" fill="'+s.shirt+'"/><circle cx="56" cy="168" r="12" fill="'+s.shirt+'"/><circle cx="144" cy="168" r="12" fill="'+s.shirt+'"/>';}
    if(s.dress){m+='<polygon points="72,150 128,150 152,236 48,236" fill="'+s.dress+'"/><rect x="70" y="142" width="10" height="20" rx="4" fill="'+s.dress+'"/><rect x="120" y="142" width="10" height="20" rx="4" fill="'+s.dress+'"/>';}
    if(s.shoes){m+='<ellipse cx="76" cy="245" rx="18" ry="11" fill="'+s.shoes+'"/><ellipse cx="124" cy="245" rx="18" ry="11" fill="'+s.shoes+'"/>';}
    m+='<circle cx="100" cy="86" r="48" fill="'+c.fur+'"/>';
    if(sp==='panda'){m+='<ellipse cx="82" cy="84" rx="11" ry="15" fill="#2E2E2E" transform="rotate(-18 82 84)"/><ellipse cx="118" cy="84" rx="11" ry="15" fill="#2E2E2E" transform="rotate(18 118 84)"/>';}
    m+='<ellipse cx="100" cy="102" rx="26" ry="19" fill="'+c.light+'"/>';
    if(sp==='panda'){m+='<circle cx="84" cy="84" r="5" fill="#fff"/><circle cx="116" cy="84" r="5" fill="#fff"/><circle cx="84" cy="85" r="3" fill="#2E2E2E"/><circle cx="116" cy="85" r="3" fill="#2E2E2E"/>';}
    else{m+='<circle cx="84" cy="84" r="7" fill="#3B2A20"/><circle cx="116" cy="84" r="7" fill="#3B2A20"/><circle cx="86" cy="81" r="2.4" fill="#fff"/><circle cx="118" cy="81" r="2.4" fill="#fff"/>';}
    if(sp==='koala'){m+='<ellipse cx="100" cy="100" rx="13" ry="17" fill="'+c.nose+'"/>';}
    else{m+='<ellipse cx="100" cy="96" rx="7" ry="5" fill="'+c.nose+'"/>';}
    m+='<path d="M100 '+(sp==='koala'?'118':'100')+' q-8 9 -15 3 M100 '+(sp==='koala'?'118':'100')+' q8 9 15 3" stroke="#5B3A2E" stroke-width="2.4" fill="none" stroke-linecap="round"/>';
    m+='<circle cx="74" cy="98" r="6" fill="#F7B6C9" opacity="0.7"/><circle cx="126" cy="98" r="6" fill="#F7B6C9" opacity="0.7"/>';
    return m;
  }

  function scene(t){
    if(t==='kitchen'){
      var inner='<rect width="400" height="560" fill="#FBE7C6"/>'
        +'<rect x="248" y="70" width="120" height="120" rx="8" fill="#BFE3F5" stroke="#fff" stroke-width="8"/>'
        +'<line x1="308" y1="74" x2="308" y2="186" stroke="#fff" stroke-width="6"/><line x1="252" y1="130" x2="364" y2="130" stroke="#fff" stroke-width="6"/>'
        +'<circle cx="282" cy="102" r="14" fill="#FFD86B"/>'
        +'<rect x="40" y="92" width="150" height="12" rx="3" fill="#A9744B"/>'
        +'<rect x="58" y="64" width="16" height="28" rx="3" fill="#9FD8C7"/><rect x="90" y="60" width="18" height="32" rx="3" fill="#F4A9C0"/><rect x="126" y="66" width="14" height="26" rx="3" fill="#F6C76B"/>'
        +'<rect x="0" y="360" width="400" height="62" fill="#C98A5E"/><rect x="0" y="360" width="400" height="10" fill="#B5774B"/>'
        +'<rect x="0" y="420" width="400" height="140" fill="#F4DDB3"/>';
      var cells='';for(var r=0;r<3;r++){for(var c=0;c<10;c++){if((r+c)%2===0){cells+='<rect x="'+(c*40)+'" y="'+(420+r*47)+'" width="40" height="47" fill="#E8C893"/>';}}}
      return '<svg viewBox="0 0 400 560" preserveAspectRatio="xMidYMid slice" width="100%" height="100%">'+inner+cells+'</svg>';
    }
    return '<svg viewBox="0 0 400 560" preserveAspectRatio="xMidYMid slice" width="100%" height="100%"><rect width="400" height="560" fill="url(#bg_'+t+')"/></svg>';
  }
  function thumb(t){
    var bg;
    if(t==='kitchen'){
      bg='<rect width="64" height="64" fill="#FBE7C6"/><rect x="0" y="40" width="64" height="24" fill="#C98A5E"/><rect x="0" y="46" width="64" height="18" fill="#F4DDB3"/><rect x="0" y="46" width="16" height="18" fill="#E8C893"/><rect x="32" y="46" width="16" height="18" fill="#E8C893"/><rect x="34" y="10" width="24" height="24" rx="3" fill="#BFE3F5" stroke="#fff" stroke-width="3"/><circle cx="44" cy="20" r="5" fill="#FFD86B"/>';
    } else { bg='<rect width="64" height="64" fill="url(#bg_'+t+')"/>'; }
    return '<svg width="62" height="62" viewBox="0 0 64 64" aria-hidden="true"><defs><clipPath id="clip_'+t+'"><circle cx="32" cy="32" r="31"/></clipPath></defs><g clip-path="url(#clip_'+t+')">'+bg+'</g><circle cx="32" cy="32" r="30" fill="none" stroke="#fff" stroke-width="3"/></svg>';
  }
  function paintScene(boxId,aw){var el=document.getElementById(boxId);if(!el)return;el.innerHTML='<div style="position:absolute;inset:0">'+scene(state.bg)+'</div><svg viewBox="0 0 200 250" width="'+aw+'" style="position:absolute;left:50%;bottom:-6px;transform:translateX(-50%)">'+render(state)+'</svg>';}

  var INGR=[['flour','Flour'],['sugar','Sugar'],['eggs','Eggs'],['chips','Choc chips']];
  var STIR_GOAL=6;
  var cookState=null;
  function navStyle(bg,sh){return 'background:'+bg+';color:#fff;border:3px solid #fff;border-radius:30px;padding:10px 22px;font-size:17px;font-weight:500;cursor:pointer;box-shadow:0 3px 0 '+sh+';display:inline-flex;align-items:center;gap:6px;';}
  function bowlSVG(o){o=o||{};var blobs='';
    if(o.dough){blobs='<ellipse cx="100" cy="56" rx="62" ry="15" fill="#E8C98A"/><ellipse cx="82" cy="51" rx="14" ry="8" fill="#EBD09A"/><ellipse cx="120" cy="53" rx="12" ry="7" fill="#EBD09A"/><circle cx="92" cy="55" r="3" fill="#5B3A2E"/><circle cx="112" cy="57" r="3" fill="#5B3A2E"/><circle cx="103" cy="60" r="3" fill="#5B3A2E"/>';}
    else if(o.added){var a=o.added;if(a.flour)blobs+='<ellipse cx="78" cy="57" rx="16" ry="8" fill="#FFFFFF"/>';if(a.sugar)blobs+='<ellipse cx="118" cy="55" rx="14" ry="7" fill="#F1F1F1"/><circle cx="110" cy="53" r="1.5" fill="#fff"/><circle cx="124" cy="57" r="1.5" fill="#fff"/>';if(a.eggs)blobs+='<circle cx="100" cy="55" r="9" fill="#FFD86B"/><circle cx="100" cy="55" r="4" fill="#F6B400"/>';if(a.chips)blobs+='<circle cx="86" cy="61" r="3.5" fill="#5B3A2E"/><circle cx="112" cy="61" r="3.5" fill="#5B3A2E"/><circle cx="100" cy="64" r="3.5" fill="#5B3A2E"/>';}
    return '<svg viewBox="0 0 200 150" width="180" aria-hidden="true"><path d="M20 56 Q100 150 180 56 Z" fill="#CFC4AE"/><ellipse cx="100" cy="56" rx="80" ry="20" fill="#E6DECB"/><ellipse cx="100" cy="57" rx="70" ry="15" fill="#F2ECDD"/>'+blobs+(o.spoon?'<rect x="120" y="2" width="9" height="64" rx="4" fill="#C58A4E" transform="rotate(20 124 34)"/><ellipse cx="150" cy="60" rx="13" ry="8" fill="#C58A4E"/>':'')+'</svg>';
  }
  function cookieSVG(o,size){o=o||{};var base=o.baked?'#C98A3E':'#E8D2A6';var chip=o.baked?'#4A2D1A':'#7A5A3A';var m='<circle cx="60" cy="60" r="48" fill="'+base+'"/><circle cx="44" cy="50" r="6" fill="'+chip+'"/><circle cx="74" cy="46" r="6" fill="'+chip+'"/><circle cx="64" cy="74" r="6" fill="'+chip+'"/><circle cx="40" cy="74" r="5" fill="'+chip+'"/><circle cx="82" cy="68" r="5" fill="'+chip+'"/>';if(o.frosting){m+='<path d="M18 54 A48 48 0 0 1 102 54 Q92 72 60 68 Q32 66 18 54 Z" fill="'+o.frosting+'" opacity="0.92"/>';}if(o.sprinkles){m+='<rect x="40" y="40" width="9" height="3" rx="1.5" fill="#fff" transform="rotate(20 44 41)"/><rect x="64" y="38" width="9" height="3" rx="1.5" fill="#7BD389" transform="rotate(-25 68 39)"/><rect x="52" y="50" width="9" height="3" rx="1.5" fill="#64B5F6" transform="rotate(40 56 51)"/><rect x="74" y="50" width="9" height="3" rx="1.5" fill="#FF8FB0" transform="rotate(-10 78 51)"/>';}return '<svg viewBox="0 0 120 120" width="'+(size||120)+'" aria-hidden="true">'+m+'</svg>';}
  function cookieRow(g){var base=g?'#C98A3E':'#E8D2A6';var chip=g?'#4A2D1A':'#7A5A3A';var m='<rect x="52" y="118" width="96" height="8" rx="3" fill="#9A9A9A"/>';var cx=[72,100,128];for(var i=0;i<3;i++){m+='<circle cx="'+cx[i]+'" cy="110" r="13" fill="'+base+'"/><circle cx="'+(cx[i]-5)+'" cy="107" r="2.5" fill="'+chip+'"/><circle cx="'+(cx[i]+4)+'" cy="112" r="2.5" fill="'+chip+'"/>';}return m;}
  function ovenSVG(o){o=o||{};var win=o.closed?'<rect x="50" y="72" width="100" height="58" rx="6" fill="#3A2E2A"/><rect x="50" y="72" width="100" height="58" rx="6" fill="#E8732A" opacity="0.45"/>':'<rect x="50" y="72" width="100" height="58" rx="6" fill="#BFE3F5"/>'+cookieRow(o.golden);return '<svg viewBox="0 0 200 170" width="190" aria-hidden="true"><rect x="34" y="40" width="132" height="124" rx="10" fill="#C4CDD2"/><rect x="40" y="44" width="120" height="14" rx="5" fill="#AEB8BE"/><circle cx="60" cy="51" r="4" fill="#7A848A"/><circle cx="80" cy="51" r="4" fill="#7A848A"/><rect x="40" y="62" width="120" height="96" rx="8" fill="#9AA6AD"/>'+win+'<rect x="60" y="150" width="80" height="7" rx="3" fill="#7A848A"/></svg>';}
  function allAdded(){var a=cookState.added;return a.flour&&a.sugar&&a.eggs&&a.chips;}
  function startCook(){cookState={step:1,added:{flour:false,sugar:false,eggs:false,chips:false},stir:0,baking:false,baked:false,timer:0,frosting:null,sprinkles:false};renderCook();}
  function startBake(){cookState.baking=true;cookState.timer=5;renderCook();var iv=setInterval(function(){cookState.timer--;if(cookState.timer<=0){clearInterval(iv);cookState.baking=false;cookState.baked=true;ding();}renderCook();},800);}
  function renderCook(){
    if(!cookState)return;
    var area=document.getElementById('cookArea'),btns=document.getElementById('cookBtns'),title=document.getElementById('cookTitle');
    var aH='',bH='',tH='';var i;
    if(cookState.step===1){
      tH='Step 1: Add the ingredients!';
      aH=bowlSVG({added:cookState.added})+'<div style="display:flex;gap:8px;flex-wrap:wrap;justify-content:center;margin-top:8px">';
      for(i=0;i<INGR.length;i++){var id=INGR[i][0];var dn=cookState.added[id];aH+='<button class="ingBtn" data-ing="'+id+'" '+(dn?'disabled':'')+' style="border:2px solid #fff;border-radius:14px;padding:8px 14px;font-size:15px;font-weight:500;cursor:'+(dn?'default':'pointer')+';background:'+(dn?'#CDE8B5':'#fff')+';color:#5D4037">'+(dn?'✓ ':'')+INGR[i][1]+'</button>';}
      aH+='</div>';
      if(allAdded())bH='<button class="cookNav" data-go="2" style="'+navStyle('#E0795A','#B85A3E')+'">Mix it! <i class="ti ti-arrow-right"></i></button>';
    } else if(cookState.step===2){
      tH='Step 2: Stir it up!';
      var pct=Math.min(100,Math.round(cookState.stir/STIR_GOAL*100));
      aH=bowlSVG({dough:true,spoon:true})+'<div style="width:180px;height:14px;background:#EADFCA;border-radius:8px;margin:10px 0;overflow:hidden"><div style="width:'+pct+'%;height:100%;background:#7BC043;transition:width .15s"></div></div>';
      if(cookState.stir<STIR_GOAL)aH+='<button class="stirBtn" style="'+navStyle('#F4A9C0','#C97A95')+'">Stir! <i class="ti ti-refresh"></i></button>';
      else bH='<button class="cookNav" data-go="3" style="'+navStyle('#E0795A','#B85A3E')+'">To the oven! <i class="ti ti-arrow-right"></i></button>';
    } else if(cookState.step===3){
      if(cookState.baking){tH='Baking... '+cookState.timer;aH=ovenSVG({closed:true});}
      else if(cookState.baked){tH='Ding! They are ready!';aH=ovenSVG({closed:false,golden:true});bH='<button class="cookNav" data-go="4" style="'+navStyle('#E0795A','#B85A3E')+'">Take them out! <i class="ti ti-arrow-right"></i></button>';}
      else{tH='Step 3: Bake the cookies!';aH=ovenSVG({closed:false,golden:false})+'<button class="bakeBtn" style="'+navStyle('#E0795A','#B85A3E')+'margin-top:10px">Bake! <i class="ti ti-flame"></i></button>';}
    } else if(cookState.step===4){
      tH='Step 4: Decorate!';
      aH='<div>'+cookieSVG({baked:true,frosting:cookState.frosting,sprinkles:cookState.sprinkles},150)+'</div>';
      aH+='<div style="font-size:13px;color:#9A8576;margin-top:2px">Pick frosting:</div><div style="display:flex;gap:8px;margin-top:5px;flex-wrap:wrap;justify-content:center">';
      for(i=0;i<PALETTE.length;i++){aH+='<button class="frostBtn" data-c="'+PALETTE[i][0]+'" aria-label="frosting" style="width:34px;height:34px;border-radius:50%;border:3px solid #fff;background:'+PALETTE[i][0]+';cursor:pointer;box-shadow:0 0 0 1px #ddd"></button>';}
      aH+='</div><button class="sprBtn" style="margin-top:10px;border:2px solid #E0B98C;border-radius:14px;padding:7px 16px;font-size:14px;font-weight:500;cursor:pointer;background:'+(cookState.sprinkles?'#FFE08A':'#fff')+';color:#5D4037">'+(cookState.sprinkles?'✓ Sprinkles on':'Add sprinkles')+'</button>';
      bH='<button class="cookNav" data-go="5" style="'+navStyle('#34A853','#1f7a37')+'">It\'s ready! <i class="ti ti-check"></i></button>';
    } else if(cookState.step===5){
      tH='Yum! You made cookies!';
      aH='<div style="position:relative;width:200px;height:198px"><svg viewBox="0 0 200 250" width="160" style="position:absolute;left:50%;bottom:0;transform:translateX(-50%)">'+render(state)+'</svg><div style="position:absolute;left:53%;bottom:60px">'+cookieSVG({baked:true,frosting:cookState.frosting,sprinkles:cookState.sprinkles},56)+'</div></div><div style="font-size:30px;color:#F6B400;letter-spacing:6px">★ ★ ★</div>';
      bH='<button class="cookNav" data-go="restart" style="'+navStyle('#BA9DDA','#8E6FB0')+'">Cook again <i class="ti ti-refresh"></i></button><button class="cookNav" data-go="reveal" style="border:2px solid #E0B98C;background:#fff;color:#5D4037;border-radius:30px;padding:10px 18px;font-size:15px;font-weight:500;cursor:pointer">All done</button>';
    }
    title.textContent=tH;area.innerHTML=aH;btns.innerHTML=bH;attachCook();
  }
  function attachCook(){
    var a=document.getElementById('cookArea'),b=document.getElementById('cookBtns');
    a.querySelectorAll('.ingBtn').forEach(function(x){x.addEventListener('click',function(){if(!this.disabled){cookState.added[this.getAttribute('data-ing')]=true;renderCook();}});});
    var sb=a.querySelector('.stirBtn');if(sb)sb.addEventListener('click',function(){cookState.stir++;renderCook();});
    var bk=a.querySelector('.bakeBtn');if(bk)bk.addEventListener('click',startBake);
    a.querySelectorAll('.frostBtn').forEach(function(x){x.addEventListener('click',function(){cookState.frosting=this.getAttribute('data-c');renderCook();});});
    var sp=a.querySelector('.sprBtn');if(sp)sp.addEventListener('click',function(){cookState.sprinkles=!cookState.sprinkles;renderCook();});
    b.querySelectorAll('.cookNav').forEach(function(x){x.addEventListener('click',function(){var g=this.getAttribute('data-go');if(g==='restart')startCook();else if(g==='reveal')show(3);else{cookState.step=parseInt(g,10);renderCook();}});});
  }

  function update(){var sm=render(state);var p=document.getElementById('charPreview');if(p)p.innerHTML=sm;paintScene('revealBox',150);paintScene('bgPreview',128);}
  function buildAnimals(){var w=document.getElementById('animRow');var h='';for(var i=0;i<ANIMALS.length;i++){var a=ANIMALS[i];h+='<button class="animBtn" data-sp="'+a[0]+'" style="border:2px solid #fff;background:#fff;border-radius:13px;padding:6px 10px;font-size:14px;font-weight:500;cursor:pointer;display:flex;align-items:center;gap:5px;color:#5D4037;"><span style="width:13px;height:13px;border-radius:50%;background:'+a[2]+';box-shadow:0 0 0 1px #ccc;display:inline-block;"></span>'+a[1]+'</button>';}w.innerHTML=h;var ab=w.querySelectorAll('.animBtn');for(var j=0;j<ab.length;j++){ab[j].addEventListener('click',function(){state.species=this.getAttribute('data-sp');update();hi('.animBtn','data-sp',state.species);});}}
  function buildSwatches(){var w=document.getElementById('swatches');if(!w)return;var h='';h+='<button class="sw" data-c="none" aria-label="None" style="width:38px;height:38px;border-radius:50%;border:2px solid #ccc;background:#fff;cursor:pointer;color:#bbb;font-size:18px;line-height:1;">&#10005;</button>';for(var i=0;i<PALETTE.length;i++){h+='<button class="sw" data-c="'+PALETTE[i][0]+'" aria-label="'+PALETTE[i][1]+'" style="width:38px;height:38px;border-radius:50%;border:3px solid #fff;background:'+PALETTE[i][0]+';cursor:pointer;box-shadow:0 0 0 1px #ddd;"></button>';}w.innerHTML=h;var sws=w.querySelectorAll('.sw');for(var j=0;j<sws.length;j++){sws[j].addEventListener('click',function(){var v=this.getAttribute('data-c');state[category]=(v==='none')?null:v;update();highlightSw();});}highlightSw();}
  function highlightSw(){var sws=document.querySelectorAll('#swatches .sw');for(var i=0;i<sws.length;i++){var v=sws[i].getAttribute('data-c');var cur=state[category]||'none';sws[i].style.outline=(v===cur)?'3px solid #E0795A':'none';sws[i].style.outlineOffset='2px';}}
  function buildBgCircles(){var w=document.getElementById('bgRow');var h='';for(var i=0;i<BGS.length;i++){var t=BGS[i][0];h+='<button class="bgBtn" data-bg="'+t+'" aria-label="'+BGS[i][1]+'" style="border:none;background:none;cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:5px;padding:2px;transition:transform .1s;">'+thumb(t)+'<span class="onPill" style="padding:2px 12px;border-radius:12px;font-size:12px;font-weight:500;background:#fff;color:#9A8576;border:1px solid #E0B98C;">On</span></button>';}w.innerHTML=h;var bs=w.querySelectorAll('.bgBtn');for(var j=0;j<bs.length;j++){bs[j].addEventListener('click',function(){selectBg(this.getAttribute('data-bg'));});}highlightBg();}
  function highlightBg(){var bs=document.querySelectorAll('.bgBtn');for(var i=0;i<bs.length;i++){var on=bs[i].getAttribute('data-bg')===state.bg;var pill=bs[i].querySelector('.onPill');if(pill){pill.style.background=on?'#34A853':'#fff';pill.style.color=on?'#fff':'#9A8576';pill.style.border=on?'2px solid #fff':'1px solid #E0B98C';pill.style.boxShadow=on?'0 0 0 2px #34A853':'none';}bs[i].style.transform=on?'scale(1.1)':'none';}}
  function selectBg(t){state.bg=t;paintScene('bgPreview',128);paintScene('revealBox',150);highlightBg();}

  function show(n){['screen1','screen2','screen3','screen4','screen5'].forEach(function(id,i){var el=document.getElementById(id);if(el)el.style.display=(i===(n-1))?'flex':'none';});update();}
  function hi(sel,attr,val){var els=document.querySelectorAll(sel);for(var i=0;i<els.length;i++){var on=els[i].getAttribute(attr)===val;els[i].style.borderColor=on?'#E0795A':'#fff';els[i].style.background=on?'#FFF0EA':'#fff';}}

  document.getElementById('playBtn').addEventListener('click',function(){if(musicOn)startMusic();show(2);hi('.animBtn','data-sp',state.species);hi('.catBtn','data-cat',category);});
  document.getElementById('doneBtn').addEventListener('click',function(){show(3);});
  document.getElementById('backBtn').addEventListener('click',function(){show(2);});
  document.getElementById('bgPageBtn').addEventListener('click',function(){show(4);});
  document.getElementById('readyBtn').addEventListener('click',function(){show(3);});
  document.getElementById('cookBtn').addEventListener('click',function(){startCook();show(5);});
  document.getElementById('soundBtn').addEventListener('click',function(){setMusic(!musicOn);});
  var cb=document.querySelectorAll('.catBtn');for(var k=0;k<cb.length;k++){cb[k].addEventListener('click',function(){category=this.getAttribute('data-cat');hi('.catBtn','data-cat',category);highlightSw();});}

  buildAnimals();buildSwatches();buildBgCircles();update();show(1);
})();
</script>
</body>
</html>
